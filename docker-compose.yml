version: '3.8'

services:
  video-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Web UI — open http://localhost:8080 in your browser after starting the container.
      - "8080:8080"
    volumes:
      # Mount the project directory so the container can read inputs and write outputs.
      # PROJECT_DIR defaults to the current directory if not set.
      - ${PROJECT_DIR:-.}:/workspace
    environment:
      - INPUT_DIR=/workspace
      # ONNX_THREADS: total CPU threads for TTS inference (0 = auto-detect all cores)
      - ONNX_THREADS=0
